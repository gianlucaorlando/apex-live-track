services:
  - type: web
    name: f1-live-track
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: OPENF1_API_TOKEN
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
